<!doctype html>
<html>
  <head>
    <title>API Test Runner</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 40px;
      }

      .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
      }

      h2 {
        margin-top: 0;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
      }

      select,
      button {
        padding: 8px 12px;
        font-size: 14px;
        border-radius: 4px;
      }

      button {
        border: none;
        cursor: pointer;
      }

      .run {
        background: #2563eb;
        color: white;
      }

      .run:hover {
        background: #1e4fd6;
      }

      .cancel {
        background: #ef4444;
        color: white;
        display: none;
      }

      .cancel:hover {
        background: #dc2626;
      }

      .progressBox {
        margin-top: 10px;
        padding: 10px;
        background: #f1f5f9;
        border-radius: 6px;
        font-size: 14px;
      }

      .reports {
        margin-top: 30px;
      }

      ul {
        list-style: none;
        padding-left: 0;
      }

      li {
        margin: 6px 0;
      }

      a {
        text-decoration: none;
        color: #2563eb;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>API Test Runner</h2>

      <div class="controls">
        <select id="format">
          <option value="html">HTML Report</option>
          <option value="pdf">PDF Report</option>
        </select>

        <button class="run" onclick="runTests()">Run Tests</button>

        <button id="cancelBtn" class="cancel" onclick="cancelJob()">
          Cancel
        </button>
      </div>

      <div id="progressBox" class="progressBox" style="display: none">
        Progress: <span id="progress">0</span>%
      </div>

      <div class="reports">
        <h3>Reports</h3>
        <ul id="reportTree"></ul>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
